<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0F1117;
    font-family: 'Roboto', sans-serif;
    color: #FFFFFF;
    min-height: 100vh;
    display: flex;
    align-items: stretch;
  }

  #container {
    width: 100%;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  #status {
    font-size: 13px;
    color: #8A92A6;
    text-align: center;
    padding: 8px 0;
    min-height: 22px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    flex: 1;
  }

  .column {
    background: #161B27;
    border: 1px solid #252D3D;
    border-radius: 4px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .col-header {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding-bottom: 8px;
    border-bottom: 1px solid #252D3D;
  }

  .col-header.perf   { color: #2DD4BF; }
  .col-header.trend  { color: #60A5FA; }
  .col-header.alert  { color: #F59E0B; }
  .col-header.rec    { color: #A78BFA; }

  .insight-card {
    background: #0F1117;
    border: 1px solid #252D3D;
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.6;
    color: #D1D5DB;
    flex: 1;
  }

  .error-msg {
    color: #F87171;
    font-size: 12px;
    text-align: center;
    padding: 20px;
  }
</style>
</head>
<body>
<div id="container">
  <div id="status">Loading KPI data…</div>
  <div id="grid"></div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjCLXZFiD6hIZb7HwouyUbUPZxOMa1JKPQ0djHnktaKjL7g17YmAjQaNw4aZVdkSGsyA/exec";
  const WORKER_URL      = "https://odd-band-70d3.zenochsolutions.workers.dev";

  const COLUMNS = [
    { key: "performanceSummary", label: "Performance Summary", cls: "perf"  },
    { key: "trendAnalysis",      label: "Trend Analysis",      cls: "trend" },
    { key: "anomaliesAlerts",    label: "Anomalies & Alerts",  cls: "alert" },
    { key: "recommendations",    label: "Recommendations",     cls: "rec"   }
  ];

  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }

  function renderInsights(data) {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    COLUMNS.forEach(col => {
      const div = document.createElement("div");
      div.className = "column";

      const header = document.createElement("div");
      header.className = "col-header " + col.cls;
      header.textContent = col.label;
      div.appendChild(header);

      const items = data[col.key];
      if (Array.isArray(items)) {
        items.forEach(text => {
          const card = document.createElement("div");
          card.className = "insight-card";
          card.textContent = text;
          div.appendChild(card);
        });
      }

      grid.appendChild(div);
    });
  }

  function renderError(msg) {
    document.getElementById("grid").innerHTML =
      '<div class="error-msg">' + msg + '</div>';
  }

  async function run() {
    try {
      setStatus("Fetching KPI data…");
      const kpiRes = await fetch(APPS_SCRIPT_URL);
      if (!kpiRes.ok) throw new Error("Apps Script fetch failed: " + kpiRes.status);
      const kpiData = await kpiRes.json();

      setStatus("Generating AI insights…");
      const workerRes = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(kpiData)
      });
      if (!workerRes.ok) throw new Error("Worker fetch failed: " + workerRes.status);
      const insights = await workerRes.json();

      if (insights.error) throw new Error("Worker error: " + insights.error);

      setStatus("");
      renderInsights(insights);

    } catch (err) {
      setStatus("");
      renderError("Error: " + err.message);
    }
  }

  run();
</script>
</body>
</html>
