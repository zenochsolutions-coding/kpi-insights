<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0F1117;color:#FFFFFF;font-family:Roboto,Arial,sans-serif;font-size:12px;padding:12px;height:100vh;overflow:hidden}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;height:calc(100vh - 24px)}
.panel{background:#161B27;border:1px solid #252D3D;border-radius:4px;padding:10px 14px;overflow:hidden}
h3{font-size:10px;text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px;font-weight:600}
ul{list-style:none}
li{padding:3px 0 3px 16px;position:relative;color:#C8CDE0;line-height:1.5;font-size:12px}
.dot{position:absolute;left:0;top:3px;font-size:8px}
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:#8A92A6;font-size:13px}
.error{color:#E53935;padding:10px;font-size:12px}
</style>
</head>
<body>
<div id="root"><div class="loading">Loading AI insights...</div></div>
<script>
const GROQ_API_KEY = "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";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyjCLXZFiD6hIZb7HwouyUbUPZxOMa1JKPQ0djHnktaKjL7g17YmAjQaNw4aZVdkSGsyA/exec";

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function bullets(arr, color) {
  return arr.map(item =>
    '<li><span class="dot" style="color:'+color+'">&#9679;</span>'+escapeHtml(item)+'</li>'
  ).join("");
}

function buildHTML(ins) {
  return '<div class="grid">' +
    '<div class="panel"><h3 style="color:#4F9CF9">Performance Summary</h3><ul>'+bullets(ins.performanceSummary,"#4F9CF9")+'</ul></div>' +
    '<div class="panel"><h3 style="color:#4F9CF9">Trend Analysis</h3><ul>'+bullets(ins.trendAnalysis,"#4F9CF9")+'</ul></div>' +
    '<div class="panel"><h3 style="color:#E53935">Anomalies &amp; Alerts</h3><ul>'+bullets(ins.anomaliesAlerts,"#E53935")+'</ul></div>' +
    '<div class="panel"><h3 style="color:#4CAF50">Recommendations</h3><ul>'+bullets(ins.recommendations,"#4CAF50")+'</ul></div>' +
    '</div>';
}

async function init() {
  try {
    const dataRes = await fetch(APPS_SCRIPT_URL);
    const d = await dataRes.json();

    const prompt =
      "You are a senior call center performance analyst with 20 years of experience coaching agents and optimizing outbound sales operations. Analyze the following KPI data with depth, specificity, and actionable precision. Do not be generic. Reference the actual numbers. Identify what is working, what is underperforming, and why. Respond ONLY with a valid JSON object — no markdown, no explanation, no code fences.\n\n" +
      "CAMPAIGN TARGETS: Viktoria = 75 calls/day, Mackenzie = 90 calls/day, Combined = 165 calls/day\n" +
      "PERFORMANCE TARGETS: Contact Rate = 15%, Conversion Rate = 10-15%\n" +
      "TOTAL LEAD POOL: 3,326 leads\n\n" +
      "CURRENT METRICS:\n" +
      "Total Calls: " + d.totalCalls + " (combined target: 165/day)\n" +
      "Transfers: " + d.transfers + " | Transfer Rate: " + d.transferRate + "%\n" +
      "Contacts: " + d.contacts + " | Contact Rate: " + d.contactRate + "% (target: 15%)\n" +
      "Conversion Rate (Transfers / Contacts): " + d.conversionRate + "% (target: 10-15%)\n" +
      "Data Penetration: " + d.dataPen + "% of 3,326 leads dialed\n" +
      "Callbacks: " + d.callbacks + " | Not Interested: " + d.notInterested + "\n" +
      "Voicemail: " + d.voicemail + " | Not Available: " + d.notAvailable + "\n" +
      "Do Not Call: " + d.doNotCall + " | Wrong Number: " + d.wrongNumber + "\n\n" +
      "CAMPAIGN BREAKDOWN:\n" +
      "Viktoria: " + d.viktoriaCalls + " calls | " + d.viktoriaTransfers + " transfers | " + d.viktoriaConvRate + "% conversion | " + d.viktoriaContactRate + "% contact rate\n" +
      "Mackenzie: " + d.mackenzieCalls + " calls | " + d.mackenzieTransfers + " transfers | " + d.mackenzieConvRate + "% conversion | " + d.mackenzieContactRate + "% contact rate\n\n" +
      'Respond with this exact JSON structure. Each array must contain exactly 3 strings. Each string must be a complete, specific, data-driven insight minimum 15 words each. Reference actual numbers:\n' +
      '{"performanceSummary":["...","...","..."],"trendAnalysis":["...","...","..."],"anomaliesAlerts":["...","...","..."],"recommendations":["...","...","..."]}';

    const groqRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + GROQ_API_KEY,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [{ role: "user", content: prompt }],
        max_tokens: 1600,
        temperature: 0.5
      })
    });

    const groqData = await groqRes.json();
    const raw = groqData.choices[0].message.content.trim()
      .replace(/^```json\s*/i,"").replace(/^```\s*/i,"").replace(/\s*```$/i,"").trim();
    const ins = JSON.parse(raw);
    document.getElementById("root").innerHTML = buildHTML(ins);

  } catch(err) {
    document.getElementById("root").innerHTML =
      '<div class="panel error"><strong>Error:</strong> ' + escapeHtml(err.message) + '</div>';
  }
}

init();
</script>
</body>
</html>
